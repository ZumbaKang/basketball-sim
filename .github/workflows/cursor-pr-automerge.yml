name: Cursor PR auto-merge

on:
  pull_request_target:
    types: [opened, reopened]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  mark-ready:
    name: Mark Cursor PR ready
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.user.login == 'cursor[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Mark ready for review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr ready "$PR_URL"

  merge-after-ci:
    name: Merge successful Cursor PR
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Verify and merge Cursor PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          pr="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")"
          author="$(jq -r '.user.login' <<<"$pr")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"$pr")"
          base_branch="$(jq -r '.base.ref' <<<"$pr")"

          if [[ "$author" != "cursor[bot]" ||
                "$head_repo" != "$GITHUB_REPOSITORY" ||
                "$base_branch" != "$DEFAULT_BRANCH" ]]; then
            echo "Skipping non-Cursor, fork, or non-default-branch PR."
            exit 0
          fi

          gh pr ready "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" || true
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --match-head-commit "$TESTED_SHA"
